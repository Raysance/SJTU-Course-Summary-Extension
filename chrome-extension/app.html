<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SJTU 课堂概要导出</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main>
    <header>
      <div class="mark">S</div>
      <div>
        <h1>SJTU 课堂概要导出</h1>
      </div>
      <button id="settings-toggle" class="secondary">AI 设置</button>
    </header>

    <section class="card course-card">
      <div>
        <span class="eyebrow">当前课程</span>
        <h2 id="course">正在查找已打开的课堂视频页…</h2>
        <p id="meta">请保持课程页面在 Chrome 中打开并已完成登录。</p>
      </div>
      <button id="refresh" class="secondary">重新读取</button>
    </section>

    <section id="settings-panel" class="card settings-panel hidden">
      <div class="section-title">
        <div>
          <span class="eyebrow">AI 设置</span>
          <h2>模型与密钥</h2>
        </div>
        <label class="switch">
          <input id="use-ai" type="checkbox" checked>
          <span></span>
          使用 AI
        </label>
      </div>

      <label class="field" id="key-row">
        <span>AI 服务</span>
        <div class="ai-grid">
          <label>
            <small>供应商</small>
            <select id="provider">
              <option value="deepseek">DeepSeek</option>
              <option value="openai">ChatGPT / OpenAI</option>
              <option value="anthropic">Claude / Anthropic</option>
              <option value="gemini">Gemini / Google</option>
            </select>
          </label>
          <label>
            <small>模型</small>
            <input id="model" type="text" autocomplete="off">
          </label>
        </div>
        <span class="field-subtitle">API Key</span>
        <div class="key-line">
          <input id="api-key" type="password" autocomplete="off" placeholder="sk-…">
        </div>
        <div class="config-actions">
          <button id="save-key" class="secondary">保存</button>
          <button id="test-ai" class="secondary">测速</button>
          <small id="speed-result">尚未测速</small>
        </div>
      </label>
    </section>

    <section class="card">
      <div class="section-title">
        <div>
          <span class="eyebrow">导出设置</span>
          <h2>选择日期并导出</h2>
        </div>
      </div>

      <label class="field compact">
        <span>导出范围</span>
        <div class="date-toolbar">
          <button id="select-all-days" class="secondary" disabled>全选</button>
          <button id="clear-days" class="secondary" disabled>清空</button>
        </div>
        <div id="day-list" class="day-list muted">正在读取日期…</div>
      </label>

      <label class="field" id="prompt-row">
        <span>追加 Prompt（可选）</span>
        <textarea id="custom-prompt" rows="4" placeholder="例如：请更偏向期末复习；请保留关键概念英文名；请按老师强调频次排序。"></textarea>
      </label>
      <div class="actions">
        <button id="export-selected" class="primary" disabled>导出所选范围</button>
      </div>
    </section>

    <section class="card progress-card">
      <div class="progress-head">
        <strong id="progress-title">准备就绪</strong>
        <span id="progress-count">0 / 0</span>
      </div>
      <div class="track"><div id="bar"></div></div>
      <pre id="log">打开课程视频页后，点击“重新读取”。</pre>
    </section>

  </main>
  <script src="app.js"></script>
</body>
</html>
