<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SJTU 课堂概要导出</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main>
    <header>
      <div class="mark">S</div>
      <h1>SJTU 课堂概要导出</h1>
      <button id="settings-toggle" class="icon-button secondary" aria-label="AI 设置" title="AI 设置">
        <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Zm7.4-3.5c0-.5-.1-1-.2-1.5l2-1.5-2-3.5-2.4 1a8 8 0 0 0-2.6-1.5L14 2h-4l-.4 3a8 8 0 0 0-2.5 1.5l-2.4-1-2 3.5 2 1.5a8.4 8.4 0 0 0 0 3l-2 1.5 2 3.5 2.4-1a8 8 0 0 0 2.5 1.5l.4 3h4l.4-3a8 8 0 0 0 2.6-1.5l2.4 1 2-3.5-2-1.5c.1-.5.2-1 .2-1.5Z"/></svg>
      </button>
    </header>

    <section class="card course-card">
      <div>
        <span class="eyebrow">当前课程</span>
        <h2 id="course">正在查找课堂视频页…</h2>
        <p id="meta">请保持课程页面已打开并完成登录。</p>
      </div>
      <button id="refresh" class="icon-button secondary" aria-label="重新读取" title="重新读取">
        <svg class="icon-refresh" viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <linearGradient id="refreshGradient" x1="4" y1="4" x2="20" y2="20" gradientUnits="userSpaceOnUse">
              <stop stop-color="#2f80ed"/>
              <stop offset="1" stop-color="#56ccf2"/>
            </linearGradient>
          </defs>
          <path class="soft" d="M6.4 8.3A7.2 7.2 0 0 1 18 7.4"/>
          <path class="strong" d="M18.2 4.7v3.8h-3.8"/>
          <path class="soft" d="M17.6 15.7A7.2 7.2 0 0 1 6 16.6"/>
          <path class="strong" d="M5.8 19.3v-3.8h3.8"/>
        </svg>
      </button>
    </section>

    <section class="workspace">
      <section class="card pane">
        <div class="section-title">
          <div>
            <span class="eyebrow">导出范围</span>
            <h2>选择日期</h2>
          </div>
          <div class="date-toolbar">
            <button id="select-all-days" class="icon-button secondary" aria-label="全选" title="全选" disabled>
              <svg class="icon-check-all" viewBox="0 0 24 24" aria-hidden="true">
                <path class="soft" d="m4.5 12.8 3.4 3.4 7-8"/>
                <path class="strong" d="m9.4 12.5 3.8 3.8 7-8.5"/>
              </svg>
            </button>
            <button id="clear-days" class="icon-button secondary" aria-label="清空" title="清空" disabled>
              <svg class="icon-clear" viewBox="0 0 24 24" aria-hidden="true">
                <path class="soft" d="M8.2 8.2a5.4 5.4 0 0 1 7.6 7.6M15.8 8.2a5.4 5.4 0 0 0-7.6 7.6"/>
                <path class="strong" d="M6 18 18 6"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="day-list" class="day-list muted">正在读取日期…</div>

        <label class="field" id="prompt-row">
          <span>追加 Prompt</span>
          <textarea id="custom-prompt" rows="5" placeholder="例如：请更偏向期末复习；请保留关键概念英文名；请按老师强调频次排序。"></textarea>
        </label>

        <div class="actions">
          <button id="export-selected" class="icon-button primary" aria-label="开始导出" title="开始导出" disabled>
            <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </button>
        </div>
      </section>

      <section class="card pane">
        <div class="progress-head">
          <strong id="progress-title">准备就绪</strong>
          <span id="progress-count">0 / 0</span>
        </div>
        <div class="track"><div id="bar"></div></div>
        <pre id="log">打开课程视频页后，点击重新读取。</pre>
        <button id="download-zip" class="icon-button primary hidden" aria-label="下载 ZIP" title="下载 ZIP">
          <svg viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5"/><path d="M5 19h14"/></svg>
        </button>
      </section>
    </section>
  </main>

  <div id="settings-backdrop" class="modal-backdrop hidden">
    <section id="settings-panel" class="settings-modal">
      <div class="section-title">
        <div>
          <span class="eyebrow">AI 设置</span>
          <h2>模型与密钥</h2>
        </div>
        <button id="settings-close" class="icon-button secondary" aria-label="关闭" title="关闭">
          <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg>
        </button>
      </div>

      <label class="switch">
        <input id="use-ai" type="checkbox" checked>
        <span></span>
        使用 AI
      </label>

      <label class="field" id="key-row">
        <span>AI 服务</span>
        <div class="ai-grid">
          <label>
            <small>供应商</small>
            <select id="provider">
              <option value="deepseek">DeepSeek</option>
              <option value="openai">ChatGPT / OpenAI</option>
              <option value="anthropic">Claude / Anthropic</option>
              <option value="gemini">Gemini / Google</option>
            </select>
          </label>
          <label>
            <small>模型</small>
            <input id="model" type="text" autocomplete="off">
          </label>
        </div>
        <span class="field-subtitle">API Key</span>
        <input id="api-key" type="password" autocomplete="off" placeholder="sk-…">
        <div class="config-actions">
          <button id="save-key" class="icon-button secondary" aria-label="保存" title="保存">
            <svg viewBox="0 0 24 24"><path d="M5 4h12l2 2v14H5z"/><path d="M8 4v6h8V4M8 20v-7h8v7"/></svg>
          </button>
          <button id="test-ai" class="icon-button secondary" aria-label="测速" title="测速">
            <svg viewBox="0 0 24 24"><path d="M13 2 4 14h7l-1 8 10-13h-7z"/></svg>
          </button>
          <small id="speed-result">尚未测速</small>
        </div>
      </label>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
